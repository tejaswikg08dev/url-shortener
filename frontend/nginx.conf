# Nginx configuration for serving the React SPA

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression: reduces file sizes by about 70 percent
    # Faster page loads especially on slow connections
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Cache static assets for 1 year
    # Vite adds content hashes to filenames (main.a1b2c3.js)
    # When code changes the hash changes so browser fetches new file
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the backend API service
    # In Docker the service name "api-service" resolves to its container IP
    location /api/ {
        proxy_pass http://api-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # React Router support
    # Problem: user navigates to /dashboard then refreshes the browser
    # Without this: Nginx looks for a /dashboard file and returns 404
    # With this: Nginx serves index.html and React Router handles the route
    location / {
        try_files $uri $uri/ /index.html;
    }
}