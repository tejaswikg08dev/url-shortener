name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['url-shortener-*/**', 'pom.xml']
  pull_request:
    branches: [main]
    paths: ['url-shortener-*/**', 'pom.xml']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'

  docker-build-deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f url-shortener-api/Dockerfile -t $ECR_REGISTRY/url-shortener-api:latest -t $ECR_REGISTRY/url-shortener-api:${{ github.sha }} .
          docker push $ECR_REGISTRY/url-shortener-api:latest
          docker push $ECR_REGISTRY/url-shortener-api:${{ github.sha }}

      - name: Build and push Analytics image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f url-shortener-analytics/Dockerfile -t $ECR_REGISTRY/url-shortener-analytics:latest -t $ECR_REGISTRY/url-shortener-analytics:${{ github.sha }} .
          docker push $ECR_REGISTRY/url-shortener-analytics:latest
          docker push $ECR_REGISTRY/url-shortener-analytics:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/url-shortener
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo "Deployment complete at $(date)"