server:
  port: 8080
  # The API service runs on port 8080

spring:
  application:
    name: url-shortener-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    # Use environment variable if set, otherwise default to 'local'

  # PostgreSQL connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
    # ${DB_HOST:localhost} = use DB_HOST env var, default to 'localhost'
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      # HikariCP = connection pool (reuses DB connections instead of creating new ones)
      # 10 connections shared across all requests

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
      # validate = check that entities match the DB schema (don't create/modify tables)
      # Flyway creates tables — Hibernate only validates they match
      # Other options: create, create-drop, update, none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# AWS
spring.cloud.aws:
  region:
    static: ${AWS_REGION:us-east-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:test}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
  sqs:
    endpoint: ${SQS_ENDPOINT:}

# Our custom application properties
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:mySecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurityPurpose2026}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  sqs:
    click-events-queue: ${SQS_QUEUE_NAME:click-events-queue}
  rate-limit:
    ip:
      capacity: 100
    user:
      capacity: 1000
  url:
    max-length: 2048
    default-expiry-days: 365
  key-generator:
    batch-size: 1000

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.urlshortener: DEBUG